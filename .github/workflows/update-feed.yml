import requests
from bs4 import BeautifulSoup
from datetime import datetime
from xml.etree.ElementTree import Element, SubElement, ElementTree

URL = "https://globalsanctions.com/news/"
BASE = "https://globalsanctions.com"

response = requests.get(URL)
soup = BeautifulSoup(response.text, "html.parser")

rss = Element("rss", version="2.0")
channel = SubElement(rss, "channel")

SubElement(channel, "title").text = "Global Sanctions News (Custom RSS)"
SubElement(channel, "link").text = URL
SubElement(channel, "description").text = "Auto-generated feed"

count = 0

# This targets the actual article titles on the page
for link in soup.find_all("a"):
    title = link.get_text(strip=True)
    href = link.get("href")

    if not title or not href:
        continue

    # Filter to likely article links only
    if "/news/" not in href:
        continue

    if len(title) < 15:
        continue

    if not href.startswith("http"):
        href = BASE + href

    item = SubElement(channel, "item")
    SubElement(item, "title").text = title
    SubElement(item, "link").text = href
    SubElement(item, "pubDate").text = datetime.utcnow().strftime(
        "%a, %d %b %Y %H:%M:%S GMT"
    )

    count += 1
    if count >= 20:
        break

# Write the XML properly
tree = ElementTree(rss)
